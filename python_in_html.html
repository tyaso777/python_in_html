      min-height: 40px;
    }

    .column-resizer::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 7px;
      width: 2px;
      background: #d7d7d7;
      border-radius: 999px;
    }

      border: 1px solid #ddd;

      height: 520px;
      border: 1px solid #d8d8d8;

      font-size: 13px;
      line-height: 1.45;
      background: #fcfcfc;
    }

    .panel-resize-handle {
      height: 14px;
      position: relative;
      cursor: ns-resize;
    }

    .panel-resize-handle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 5px;
      width: 56px;
      height: 4px;
      margin-left: -28px;
      border-radius: 999px;
      background: #d7d7d7;
    }

    .panel-resize-handle:hover::before,
    .panel-resize-handle.is-dragging::before {
      background: #1b5fcf;
    }

    .top-panel {
      overflow: auto;
      min-height: 140px;
    }

    .CodeMirror-gutters {
      border-right: 1px solid #ececec;
      background: #f7f7f7;
    }

    .CodeMirror-activeline-background {
      background: #fff7e6;
    }

    .cm-cell-separator {
      background: linear-gradient(90deg, #ffe4b5, #fff4dd);
      color: #8a5a00;
      font-weight: 600;
    }

    .cm-current-cell {
      background: #f3f8ff;
    }

    .result-console {
      white-space: pre-wrap;
      word-break: break-word;
      background: #111;
      color: #eee;
      padding: 12px;
      border-radius: 6px;
      min-height: 220px;
      overflow: auto;
      margin: 0;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }

    .file-input {
      display: none;
    }

    .file-input-label {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid #999;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: #222;

    .small-btn {
      padding: 2px 8px;
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .config-grid {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .package-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .package-search {
      width: min(320px, 100%);
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .filter-group {
      display: grid;
      gap: 6px;
    }

    .filter-label {
      font-size: 12px;
      color: #666;
    }

    .filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-chip {
      padding: 6px 10px;
      border: 1px solid #cfcfcf;
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      color: #333;
      cursor: pointer;
    }

    .filter-chip.is-active {
      border-color: #1b5fcf;
      background: #eaf2ff;
      color: #0f4499;
      font-weight: 600;
    }

    .package-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .package-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 10px;
      align-items: start;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }

    .package-option.is-recommended {
      border-color: #b6cff8;
      background: #f4f8ff;
    }

    .package-main {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .package-label {
      font-size: 13px;
      font-weight: 600;
      color: #222;
    }

    .package-note {
      font-size: 12px;
      color: #666;
    }

      padding: 2px 6px;
      border-radius: 999px;
      font-size: 11px;
      background: #eee;
      color: #444;

      color: #0f4499;

    </div>

      <button id="resetSessionBtn" type="button" disabled>Reset Session</button>
      <button id="clearOutputBtn" type="button">Clear Output</button>

    <div id="currentCellInfo" class="current-cell-info">Current cell: -</div>

    <div id="editorCol" class="col editor-col">
      <div class="panel">
        <h2>Python code</h2>
        <p class="muted">Use <code># %%</code> to split cells. Run Current Cell executes the cell containing the cursor.</p>
        <textarea id="code"># %%
import os
import pandas as pd
import numpy as np
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt

print("files in /uploads =", os.listdir("/uploads"))

# %%
users = pd.read_csv("/uploads/sample_user.csv")
purchases = pd.read_csv("/uploads/sample_purchase.csv")

print("\n[users]")
print(users.head())

print("\n[purchases]")
print(purchases.head())

# %%
df = pd.merge(purchases, users, on="user_id", how="left")

print("\n[joined]")
print(df.head())

user_summary = (
    df.groupby("user_name")["amount"]
    .sum()
    .reset_index()
    .sort_values("amount", ascending=False)
)

print("\n[user_summary]")
print(user_summary)

# %%
plt.figure(figsize=(8, 4))
plt.bar(user_summary["user_name"], user_summary["amount"])
plt.title("Total Purchase Amount by User")
plt.xlabel("User")
plt.ylabel("Amount")
plt.xticks(rotation=30)
plt.tight_layout()
plt.savefig("/outputs/user_total.png", dpi=140)

user_summary.to_csv("/outputs/user_summary.csv", index=False)

print("\nSaved:")
print(" - /outputs/user_total.png")
print(" - /outputs/user_summary.csv")
</textarea>
      </div>
    </div>

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    /**
     * Update the editor/results column split based on viewport X.
     * @param {number} clientX
     */
    function setEditorColumnWidth(clientX) {
      const rowEl = document.querySelector(".row");
      const editorColEl = document.getElementById("editorCol");
      const resultsColEl = document.querySelector(".results-col");
      if (!rowEl || !editorColEl || !resultsColEl) {
        return;
      }

      const rowRect = rowEl.getBoundingClientRect();
      const minEditorWidth = 360;
      const minResultsWidth = 280;
      const nextWidth = Math.min(
        rowRect.width - minResultsWidth,
        Math.max(minEditorWidth, clientX - rowRect.left)
      );

      editorColEl.style.flexBasis = `${nextWidth}px`;
      resultsColEl.style.flexBasis = `${Math.max(minResultsWidth, rowRect.width - nextWidth - 16)}px`;
      if (codeEditor) {
        codeEditor.refresh();
      }
    }

    /**
     * Update the top panel height based on viewport Y.
     * @param {number} clientY
     */
    function setTopPanelHeight(clientY) {
      const topPanelEl = document.getElementById("topPanel");
      if (!topPanelEl) {
        return;
      }

      const panelRect = topPanelEl.getBoundingClientRect();
      const minHeight = 140;
      const nextHeight = Math.max(minHeight, clientY - panelRect.top);
      topPanelEl.style.height = `${nextHeight}px`;
      codeEditor.refresh();
    }

    /**
     * Create a deep copy of the default config.
     * @returns {{ configVersion: number, packages: string[], code: string }}
     */
    function getDefaultConfig() {
      return {
        configVersion: defaultConfig.configVersion,
        packages: [...defaultConfig.packages],
        code: defaultConfig.code
      };
    }

    /**
     * Get the currently selected package names.
     * @returns {string[]}
     */
    function getSelectedPackages() {
      return AVAILABLE_PACKAGES.filter((pkg) => selectedPackagesState.has(pkg));
    }

    /**
     * Get the current app config from the UI.
     * @returns {{ configVersion: number, packages: string[], code: string }}
     */
    function getCurrentConfig() {
      return {
        configVersion: CONFIG_VERSION,
        packages: getSelectedPackages(),
        code: getEditorSource()
      };
    }

    /**
     * Normalize and validate an incoming config object.
     * @param {unknown} rawConfig
     * @returns {{ configVersion: number, packages: string[], code: string }}
     */
    function normalizeConfig(rawConfig) {
      if (!rawConfig || typeof rawConfig !== "object") {
        throw new Error("Config must be a JSON object.");
      }

      const maybeConfig = /** @type {{ configVersion?: unknown, packages?: unknown, code?: unknown }} */ (rawConfig);
      const packages = Array.isArray(maybeConfig.packages)
        ? maybeConfig.packages.filter((pkg) => typeof pkg === "string" && AVAILABLE_PACKAGES.includes(pkg))
        : [];

      if (typeof maybeConfig.code !== "string") {
        throw new Error("Config field 'code' must be a string.");
      }

      return {
        configVersion: typeof maybeConfig.configVersion === "number" ? maybeConfig.configVersion : CONFIG_VERSION,
        packages: [...new Set(packages)],
        code: maybeConfig.code
      };
    }

    /**
     * Update package checkboxes from config data.
     * @param {{ packages: string[] }} config
     */
    function applyPackageSelection(config) {
      selectedPackagesState = new Set(config.packages.filter((pkg) => AVAILABLE_PACKAGES.includes(pkg)));
      renderPackageOptions();
      renderSelectedPackages();
    }

    /**
     * Apply a config to the current UI.
     * @param {{ configVersion: number, packages: string[], code: string }} config
     */
    function applyConfig(config) {
      applyPackageSelection(config);

      if (codeEditor) {
        codeEditor.setValue(config.code);
      } else {
        document.getElementById("code").value = config.code;
      }

      updateCurrentCellInfo();
      refreshEditorDecorations();
    }

    /**
     * Build the package checkbox UI.
     */
    function renderChipList(containerId, values, activeValue, dataAttr) {
      const filtersEl = document.getElementById(containerId);
      filtersEl.innerHTML = "";

      for (const value of values) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `filter-chip${value === activeValue ? " is-active" : ""}`;
        button.textContent = value;
        button.dataset[dataAttr] = value;
        filtersEl.appendChild(button);
      }
    }

    /**
     * Render package filter chips for both axes.
     */
    function renderPackageFilters() {
      renderChipList("packageLevelFilters", PACKAGE_LEVELS, activePackageLevel, "level");
      renderChipList("packageDomainFilters", PACKAGE_DOMAINS, activePackageDomain, "domain");
    }

    /**
     * Render the selected package summary.
     */
    function renderSelectedPackages() {
      const selectedEl = document.getElementById("selectedPackages");
      const selected = getSelectedPackages();
      selectedEl.textContent = `Selected: ${selected.length ? selected.join(", ") : "-"}`;
    }

    /**
     * Build the package catalog UI.
     */
    function renderPackageOptions() {
      const packageListEl = document.getElementById("packageList");
      packageListEl.innerHTML = "";

      const normalizedQuery = packageSearchQuery.trim().toLowerCase();
      const visiblePackages = PACKAGE_CATALOG.filter((pkg) => {
        const matchesLevel = activePackageLevel === "All"
          || pkg.level === activePackageLevel;
        const matchesDomain = activePackageDomain === "All"
          || pkg.domains.includes(activePackageDomain);
        const matchesQuery = normalizedQuery.length === 0
          || pkg.id.toLowerCase().includes(normalizedQuery)
          || pkg.label.toLowerCase().includes(normalizedQuery)
          || pkg.note.toLowerCase().includes(normalizedQuery);
        return matchesLevel && matchesDomain && matchesQuery;
      }).sort((a, b) => {
        const byLabel = a.label.localeCompare(b.label, "en", { sensitivity: "base" });
        return byLabel !== 0
          ? byLabel
          : a.id.localeCompare(b.id, "en", { sensitivity: "base" });
      });

      if (!visiblePackages.length) {
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.textContent = "No packages match the current filter.";
        packageListEl.appendChild(empty);
        renderSelectedPackages();
        return;
      }

      for (const pkg of visiblePackages) {
        const label = document.createElement("label");
        label.className = `package-option${pkg.level === "Recommended" ? " is-recommended" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.dataset.packageId = pkg.id;
        checkbox.checked = selectedPackagesState.has(pkg.id);

        const content = document.createElement("div");

        const main = document.createElement("div");
        main.className = "package-main";

        const packageLabel = document.createElement("span");
        packageLabel.className = "package-label";
        packageLabel.textContent = pkg.label;

        main.appendChild(packageLabel);

        if (pkg.level === "Recommended") {
          const recommendedBadge = document.createElement("span");
          recommendedBadge.className = "package-badge recommended";
          recommendedBadge.textContent = "Recommended";
          main.appendChild(recommendedBadge);
        }

        const levelBadge = document.createElement("span");
        levelBadge.className = "package-badge";
        levelBadge.textContent = pkg.level;
        main.appendChild(levelBadge);

        if (pkg.heavy) {
          const heavyBadge = document.createElement("span");
          heavyBadge.className = "package-badge heavy";
          heavyBadge.textContent = "Heavy";
          main.appendChild(heavyBadge);
        }

        const note = document.createElement("div");
        note.className = "package-note";
        note.textContent = `${pkg.id} | ${pkg.domains.join(", ")} | ${pkg.note}`;

        label.appendChild(checkbox);
        content.appendChild(main);
        content.appendChild(note);
        label.appendChild(content);
        packageListEl.appendChild(label);
      }

      renderSelectedPackages();
    }

    /**
     * Get the CodeMirror source text.
     * @returns {string}
     */
    function getEditorSource() {
      return codeEditor ? codeEditor.getValue() : document.getElementById("code").value;
    }

    /**
     * Get the current editor cursor as a character index.
     * @returns {number}
     */
    function getEditorCursorIndex() {
      if (!codeEditor) {
        return document.getElementById("code").selectionStart;
      }

      return codeEditor.indexFromPos(codeEditor.getCursor());
    }

    /**
     * Replace unsafe characters in uploaded file names.
     * @param {string} fileName
     * @returns {string}
     */
    function sanitizeFileName(fileName) {
      return fileName.replace(/[^\w.\-]/g, "_");
    }

    /**
     * Ensure a directory exists in Pyodide FS.
     * @param {string} path
     */
    function ensureDir(path) {
      try {
        pyodide.FS.mkdirTree(path);
      } catch (_error) {
        // Ignore if the directory already exists.
      }
    }

    /**
     * Remove all files inside a directory if it exists.
     * @param {string} path
     */
    function clearDir(path) {
      try {
        const names = pyodide.FS.readdir(path).filter((name) => name !== "." && name !== "..");
        for (const name of names) {
          const fullPath = `${path}/${name}`;
          const stat = pyodide.FS.stat(fullPath);
          if (pyodide.FS.isDir(stat.mode)) {
            clearDir(fullPath);
            pyodide.FS.rmdir(fullPath);
          } else {
            pyodide.FS.unlink(fullPath);
          }
        }
      } catch (_error) {
        // Ignore if the directory does not exist.
      }
    }

    /**
     * Render uploaded files with delete buttons.
     */
    function renderUploadedFiles() {
      const el = document.getElementById("uploadedFiles");
      el.innerHTML = "";

      if (currentFiles.size === 0) {
        el.textContent = "No files uploaded yet.";
        return;
      }

      const list = document.createElement("ul");

      for (const [safeName, file] of currentFiles.entries()) {
        const li = document.createElement("li");

        const nameSpan = document.createElement("span");
        nameSpan.textContent = `/uploads/${safeName} `;
        li.appendChild(nameSpan);

        const sizeSpan = document.createElement("span");
        sizeSpan.textContent = `(${file.size} bytes) `;
        sizeSpan.style.color = "#666";
        li.appendChild(sizeSpan);

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.type = "button";
        deleteBtn.className = "small-btn";
        deleteBtn.style.marginLeft = "8px";
        deleteBtn.addEventListener("click", () => {
          currentFiles.delete(safeName);
          renderUploadedFiles();

          const operation = createOperationCard("Delete File", { includeConsole: false });
          appendTextListSection(operation.bodyEl, "Deleted Files", [`/uploads/${safeName}`]);
        });
        li.appendChild(deleteBtn);

        list.appendChild(li);
      }

      el.appendChild(list);
    }

    /**
     * Write current uploaded files into /uploads.
     * @returns {Promise<string[]>}
     */
    async function writeUploadsToFs() {
      ensureDir("/uploads");
      clearDir("/uploads");

      const savedPaths = [];
      for (const [safeName, file] of currentFiles.entries()) {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const path = `/uploads/${safeName}`;
        pyodide.FS.writeFile(path, bytes);
        savedPaths.push(path);
      }

      return savedPaths;
    }

    /**
     * Create a downloadable Blob URL from a file in Pyodide FS.
     * @param {string} fsPath
     * @returns {{ url: string, fileName: string }}
     */
    function createBlobUrlFromFs(fsPath) {
      const data = pyodide.FS.readFile(fsPath);
      const blob = new Blob([data]);
      const url = URL.createObjectURL(blob);
      createdObjectUrls.push(url);
      const fileName = fsPath.split("/").pop() || "download.bin";
      return { url, fileName };
    }

    /**
     * Revoke all saved object URLs.
     */
    function revokeObjectUrls() {
      for (const url of createdObjectUrls) {
        URL.revokeObjectURL(url);
      }
      createdObjectUrls = [];
    }

    /**
     * Clear the operation result history.
     */
    function clearResultHistory() {
      revokeObjectUrls();
      activeOperation = null;
      operationCount = 0;
      document.getElementById("resultHistory").innerHTML =
        '<div id="resultHistoryEmpty" class="history-empty">No operations yet.</div>';
    }

    /**
     * Clear result history and generated output files.
     */
    function clearResults() {
      clearResultHistory();
      if (pyodide) {
        ensureDir("/outputs");
        clearDir("/outputs");
      }
      setStatus("Ready.");
    }

    /**
     * Save the current config as a downloadable JSON file.
     */
    function saveConfig() {
      const config = getCurrentConfig();
      const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "python_in_html.config.json";
      link.click();
      URL.revokeObjectURL(url);

      const operation = createOperationCard("Save Config", { includeConsole: false });
      appendTextListSection(operation.bodyEl, "Saved Config", [
        `packages: ${config.packages.join(", ") || "(none)"}`,
        `code length: ${config.code.length} chars`
      ]);
    }

    /**
     * Create a new operation card.
     * @param {string} title
     * @param {{ includeConsole?: boolean }} [options]
     * @returns {{ cardEl: HTMLDivElement, bodyEl: HTMLDivElement, consoleEl: HTMLPreElement }}
     */
    function createOperationCard(title, options = {}) {
      const { includeConsole = true } = options;
      const historyEl = document.getElementById("resultHistory");
      const emptyEl = document.getElementById("resultHistoryEmpty");
      if (emptyEl) {
        emptyEl.remove();
      }

      operationCount += 1;

      const cardEl = document.createElement("div");
      cardEl.className = "result-card";

      const headerEl = document.createElement("div");
      headerEl.className = "result-header";

      const titleEl = document.createElement("div");
      titleEl.className = "result-title";
      titleEl.textContent = `${operationCount}. ${title}`;

      const timeEl = document.createElement("div");
      timeEl.className = "result-time";
      timeEl.textContent = new Date().toLocaleString("en-US");

      const bodyEl = document.createElement("div");
      let consoleEl = null;

      if (includeConsole) {
        const consoleSectionEl = document.createElement("section");
        consoleSectionEl.className = "result-section";

        const consoleTitleEl = document.createElement("h3");
        consoleTitleEl.textContent = "Stdout / stderr";

        consoleEl = document.createElement("pre");
        consoleEl.className = "result-console";

        consoleSectionEl.appendChild(consoleTitleEl);
        consoleSectionEl.appendChild(consoleEl);
        bodyEl.appendChild(consoleSectionEl);
      }

      headerEl.appendChild(titleEl);
      headerEl.appendChild(timeEl);
      cardEl.appendChild(headerEl);
      cardEl.appendChild(bodyEl);
      historyEl.prepend(cardEl);

      return { cardEl, bodyEl, consoleEl };
    }

    /**
     * Append a list section to a result card.
     * @param {HTMLElement} bodyEl
     * @param {string} title
     * @param {string[]} items
     */
    function appendTextListSection(bodyEl, title, items) {
      if (!items.length) {
        return;
      }

      const sectionEl = document.createElement("section");
      sectionEl.className = "result-section";

      const headingEl = document.createElement("h3");
      headingEl.textContent = title;

      const listEl = document.createElement("ul");
      listEl.className = "file-list";

      for (const item of items) {
        const li = document.createElement("li");
        li.textContent = item;
        listEl.appendChild(li);
      }

      sectionEl.appendChild(headingEl);
      sectionEl.appendChild(listEl);
      bodyEl.appendChild(sectionEl);
    }

    /**
     * Get a snapshot of files in /outputs.
     * @returns {Map<string, Date>}
     */
    function getOutputSnapshot() {
      ensureDir("/outputs");
      const snapshot = new Map();
      const fileNames = pyodide.FS.readdir("/outputs").filter((name) => name !== "." && name !== "..");

      for (const name of fileNames) {
        const fsPath = `/outputs/${name}`;
        const stat = pyodide.FS.stat(fsPath);
        snapshot.set(name, stat.mtime);
      }

      return snapshot;
    }

    /**
     * Append image previews and download links from changed /outputs files.
     * @param {Map<string, Date>} beforeSnapshot
     */
    function appendOutputsToActiveOperation(beforeSnapshot) {
      if (!activeOperation) {
        return;
      }

      const afterSnapshot = getOutputSnapshot();
      const changedNames = [];

      for (const [name, mtime] of afterSnapshot.entries()) {
        const previousMtime = beforeSnapshot.get(name);
        if (!previousMtime || mtime > previousMtime) {
          changedNames.push(name);
        }
      }

      if (!changedNames.length) {
        return;
      }

      let imageSectionEl = null;
      let imageContainerEl = null;

      const downloadSectionEl = document.createElement("section");
      downloadSectionEl.className = "result-section";

      const downloadHeadingEl = document.createElement("h3");
      downloadHeadingEl.textContent = "Downloads";

      const downloadListEl = document.createElement("ul");
      downloadListEl.className = "download-list";

      for (const name of changedNames) {
        const fsPath = `/outputs/${name}`;
        const { url, fileName } = createBlobUrlFromFs(fsPath);

        const li = document.createElement("li");
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        link.textContent = fileName;
        li.appendChild(link);
        downloadListEl.appendChild(li);

        const lower = fileName.toLowerCase();
        if (lower.endsWith(".png") || lower.endsWith(".jpg") || lower.endsWith(".jpeg") || lower.endsWith(".gif")) {
          if (!imageSectionEl) {
            imageSectionEl = document.createElement("section");
            imageSectionEl.className = "result-section";

            const imageHeadingEl = document.createElement("h3");
            imageHeadingEl.textContent = "Images";

            imageContainerEl = document.createElement("div");
            imageContainerEl.className = "result-images";

            imageSectionEl.appendChild(imageHeadingEl);
            imageSectionEl.appendChild(imageContainerEl);
          }

          const img = document.createElement("img");
          img.src = url;
          img.alt = fileName;
          imageContainerEl.appendChild(img);
        }
      }

      if (imageSectionEl) {
        activeOperation.bodyEl.appendChild(imageSectionEl);
      }

      downloadSectionEl.appendChild(downloadHeadingEl);
      downloadSectionEl.appendChild(downloadListEl);
      activeOperation.bodyEl.appendChild(downloadSectionEl);
    }

    /**
     * Create a fresh shared namespace.
     */
    function resetSharedGlobals() {
      if (sharedGlobals && typeof sharedGlobals.destroy === "function") {
        sharedGlobals.destroy();
      }
      sharedGlobals = pyodide.runPython("dict()");
      document.getElementById("resetSessionBtn").disabled = false;
    }

    /**
     * Split source into cells with character ranges.
     * Lines beginning with '# %%' start a new cell.
     * @param {string} source
     * @returns {{ code: string, start: number, end: number, index: number }[]}
     */
    function splitCellsWithRanges(source) {
      const regex = /^# %%.*$/gm;
      const matches = [];
      let match;

      while ((match = regex.exec(source)) !== null) {
        matches.push({
          lineStart: match.index,
          lineEnd: regex.lastIndex
        });
      }

      if (matches.length === 0) {
        const trimmed = source.trim();
        return trimmed.length > 0
          ? [{ code: trimmed, start: 0, end: source.length, index: 0 }]
          : [];
      }

      const cells = [];

      for (let i = 0; i < matches.length; i += 1) {
        let start = matches[i].lineEnd;
        if (source[start] === "\r") {
          start += 1;
        }
        if (source[start] === "\n") {
          start += 1;
        }
        const end = i + 1 < matches.length ? matches[i + 1].lineStart : source.length;
        const raw = source.slice(start, end);
        const trimmed = raw.trim();

        if (trimmed.length > 0) {
          cells.push({
            code: trimmed,
            start,
            end,
            index: cells.length
          });
        }
      }

      return cells;
    }

    /**
     * Get all cells from the editor.
     * @returns {{ code: string, start: number, end: number, index: number }[]}
     */
    function getCells() {
      const source = getEditorSource();
      return splitCellsWithRanges(source);
    }

    /**
     * Get the current cell based on the editor cursor position.
     * @returns {{ code: string, start: number, end: number, index: number } | null}
     */
    function getCurrentCell() {
      const cursorPos = getEditorCursorIndex();
      const cells = getCells();

      for (const cell of cells) {
        if (cursorPos >= cell.start && cursorPos <= cell.end) {
          return cell;
        }
      }

      for (const cell of cells) {
        if (cursorPos < cell.start) {
          return cell;
        }
      }

      return cells.length > 0 ? cells[0] : null;
    }

    /**
     * Update the current cell display.
     */
    function updateCurrentCellInfo() {
      const infoEl = document.getElementById("currentCellInfo");
      const cell = getCurrentCell();

      if (!cell) {
        infoEl.textContent = "Current cell: -";
        return;
      }

      infoEl.textContent = `Current cell: ${cell.index + 1}`;
    }

    /**
     * Clear line classes from previous decorations.
     * @param {number[]} lines
     * @param {string} className
     */
    function clearDecoratedLines(lines, className) {
      if (!codeEditor) {
        return;
      }

      for (const line of lines) {
        codeEditor.removeLineClass(line, "background", className);
      }
      lines.length = 0;
    }

    /**
     * Refresh separator and current-cell highlighting in CodeMirror.
     */
    function refreshEditorDecorations() {
      if (!codeEditor) {
        return;
      }

      clearDecoratedLines(decoratedSeparatorLines, "cm-cell-separator");
      clearDecoratedLines(decoratedCurrentCellLines, "cm-current-cell");

      const source = getEditorSource();
      const sourceLines = source.split("\n");
      for (let i = 0; i < sourceLines.length; i += 1) {
        if (/^# %%.*$/.test(sourceLines[i])) {
          codeEditor.addLineClass(i, "background", "cm-cell-separator");
          decoratedSeparatorLines.push(i);
        }
      }

      const currentCell = getCurrentCell();
      if (!currentCell) {
        return;
      }

      const cellCodeStartOffset = currentCell.code.search(/\S/);
      const cellCodeStartIndex = cellCodeStartOffset >= 0
        ? currentCell.start + cellCodeStartOffset
        : currentCell.start;
      const startLine = codeEditor.posFromIndex(cellCodeStartIndex).line;
      const endIndex = Math.max(currentCell.start, currentCell.end - 1);
      const endLine = codeEditor.posFromIndex(endIndex).line;

      for (let line = startLine; line <= endLine; line += 1) {
        codeEditor.addLineClass(line, "background", "cm-current-cell");
        decoratedCurrentCellLines.push(line);
      }
    }

    /**
     * Initialize CodeMirror for the Python editor.
     */
    function initCodeEditor() {
      const textarea = document.getElementById("code");
      codeEditor = CodeMirror.fromTextArea(textarea, {
        mode: "python",
        lineNumbers: true,
        indentUnit: 4,
        tabSize: 4,
        lineWrapping: false,
        styleActiveLine: true,
        matchBrackets: true,
        viewportMargin: Infinity,
        extraKeys: {
          Tab(cm) {
            cm.execCommand("indentMore");
          },
          "Shift-Tab"(cm) {
            cm.execCommand("indentLess");
          }
        }
      });

      codeEditor.on("cursorActivity", () => {
        updateCurrentCellInfo();
        refreshEditorDecorations();
      });

      codeEditor.on("changes", () => {
        updateCurrentCellInfo();
        refreshEditorDecorations();
      });

      updateCurrentCellInfo();
      refreshEditorDecorations();
    }

    /**
     * Ensure the selected Python packages are loaded in Pyodide.
     * @returns {Promise<void>}
     */
    async function ensureSelectedPackagesLoaded() {
      const packagesToLoad = getSelectedPackages().filter((pkg) => !loadedPackages.has(pkg));
      if (!packagesToLoad.length) {
        return;
      }

      setStatus(`Loading packages: ${packagesToLoad.join(", ")}...`);
      await pyodide.loadPackage(packagesToLoad, {
        checkIntegrity: true
      });

      for (const pkg of packagesToLoad) {
        loadedPackages.add(pkg);
      }
    }

    /**
     * Prepare the file system before execution.
     * @returns {Promise<void>}
     */
    async function prepareExecution() {
      ensureDir("/uploads");
      ensureDir("/outputs");
      await writeUploadsToFs();

      const uploadedPaths = Array.from(currentFiles.keys()).map((name) => `/uploads/${name}`);
      const pyPaths = pyodide.toPy(uploadedPaths);
      pyodide.globals.set("uploaded_paths", pyPaths);
      pyPaths.destroy();
    }

    /**
     * Run one cell and append its result as one operation card.
     * @param {{ code: string, start: number, end: number, index: number }} cell
     * @returns {Promise<void>}
     */
    async function executeCellOperation(cell) {
      activeOperation = createOperationCard(`Run Current Cell ${cell.index + 1}`);
      await ensureSelectedPackagesLoaded();
      setStatus(`Preparing current cell ${cell.index + 1}...`);
      await prepareExecution();
      const outputSnapshotBefore = getOutputSnapshot();

      setStatus(`Running current cell ${cell.index + 1}...`);
      try {
        await pyodide.runPythonAsync(cell.code, {
          globals: sharedGlobals,
          filename: `cell_${cell.index + 1}.py`
        });
        appendConsole(`\n[done: current cell ${cell.index + 1}]\n`);
        appendOutputsToActiveOperation(outputSnapshotBefore);
        return true;
      } catch (error) {
        appendConsole(`\n[exception: current cell ${cell.index + 1}]\n${String(error)}\n`);
        appendOutputsToActiveOperation(outputSnapshotBefore);
        return false;
      } finally {
        activeOperation = null;
      }
    }

    /**
     * Run the current cell based on cursor position.
     * @returns {Promise<void>}
     */
    async function runCurrentCell() {
      if (!pyodide) {
        return;
      }

      const currentCell = getCurrentCell();
      if (!currentCell) {
        throw new Error("No executable cell found.");
      }

      await executeCellOperation(currentCell);
      setStatus("Ready.");
    }

    /**
     * Run all cells from top to bottom.
     * @returns {Promise<void>}
     */
    async function runAllCells() {
      if (!pyodide) {
        return;
      }

      const cells = getCells();
      if (!cells.length) {
        throw new Error("No executable cells found.");
      }

      for (let i = 0; i < cells.length; i += 1) {
        setStatus(`Running cell ${i + 1} of ${cells.length}...`);
        const success = await executeCellOperation(cells[i]);
        if (!success) {
          break;
        }
      }

      setStatus("Ready.");
    }

    /**
     * Add files to the current file set.
     * If the same sanitized file name already exists, replace it.
     * @param {FileList | File[]} files
     */
    function setFiles(files) {
      const addedFiles = [];

      for (const file of Array.from(files)) {
        const safeName = sanitizeFileName(file.name);
        currentFiles.set(safeName, file);
        addedFiles.push(`/uploads/${safeName} (${file.size} bytes)`);
      }

      renderUploadedFiles();

      if (addedFiles.length) {
        const operation = createOperationCard("Choose Files", { includeConsole: false });
        appendTextListSection(operation.bodyEl, "Selected Files", addedFiles);
      }
    }

    /**
     * Initialize Pyodide and required packages.
     * @returns {Promise<void>}
     */
    async function initPyodide() {
      setStatus("Loading Pyodide...");
      pyodide = await loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/"
      });

      pyodide.setStdout({
        batched: (msg) => appendConsole(msg + "\n")
      });

      pyodide.setStderr({
        batched: (msg) => appendConsole("[stderr] " + msg + "\n")
      });

      ensureDir("/uploads");
      ensureDir("/outputs");
      await ensureSelectedPackagesLoaded();
      resetSharedGlobals();
      renderUploadedFiles();
      updateCurrentCellInfo();

      document.getElementById("runCurrentCellBtn").disabled = false;
      document.getElementById("runAllBtn").disabled = false;

      setStatus("Ready.");
    }

    /**
     * Restore the built-in default config.
     */
    function restoreDefaultConfig() {
      applyConfig(getDefaultConfig());
      const operation = createOperationCard("Restore Default", { includeConsole: false });
      appendTextListSection(operation.bodyEl, "Applied Config", [
        `packages: ${defaultConfig.packages.join(", ")}`,
        "code: restored default content"
      ]);
      setStatus("Ready.");
    }

    /**
     * Load a config file selected by the user.
     * @param {File} file
     * @returns {Promise<void>}
     */
    async function loadConfigFile(file) {
      const text = await file.text();
      const config = normalizeConfig(JSON.parse(text));
      applyConfig(config);

      const operation = createOperationCard("Load Config", { includeConsole: false });
      appendTextListSection(operation.bodyEl, "Loaded Config", [
        `packages: ${config.packages.join(", ") || "(none)"}`,
        `code length: ${config.code.length} chars`
      ]);
      setStatus("Ready.");
    }

    document.getElementById("runCurrentCellBtn").addEventListener("click", () => {
      runCurrentCell().catch((error) => {
        appendConsole(String(error) + "\n");
        setStatus("Failed.");
      });
    });

    document.getElementById("runAllBtn").addEventListener("click", () => {
      runAllCells().catch((error) => {
        appendConsole(String(error) + "\n");
        setStatus("Failed.");
      });
    });

    document.getElementById("resetSessionBtn").addEventListener("click", () => {
      resetSharedGlobals();
      const operation = createOperationCard("Reset Session");
      operation.consoleEl.textContent = "[session reset]\n";
      setStatus("Session reset. Ready.");
    });

    document.getElementById("clearOutputBtn").addEventListener("click", () => {
      clearResults();
    });

    document.getElementById("saveConfigBtn").addEventListener("click", () => {
      saveConfig();
    });

    document.getElementById("packageLevelFilters").addEventListener("click", (event) => {
      const filterButton = event.target.closest("[data-level]");
      if (!filterButton) {
        return;
      }

      activePackageLevel = filterButton.dataset.level || "Recommended";
      renderPackageFilters();
      renderPackageOptions();
    });

    document.getElementById("packageDomainFilters").addEventListener("click", (event) => {
      const filterButton = event.target.closest("[data-domain]");
      if (!filterButton) {
        return;
      }

      activePackageDomain = filterButton.dataset.domain || "All";
      renderPackageFilters();
      renderPackageOptions();
    });

    document.getElementById("packageSearch").addEventListener("input", (event) => {
      packageSearchQuery = event.target.value || "";
      renderPackageOptions();
    });

    document.getElementById("packageList").addEventListener("change", (event) => {
      const checkbox = event.target.closest("input[data-package-id]");
      if (!checkbox) {
        return;
      }

      const packageId = checkbox.dataset.packageId;
      if (!packageId) {
        return;
      }

      if (checkbox.checked) {
        selectedPackagesState.add(packageId);
      } else {
        selectedPackagesState.delete(packageId);
      }

      renderSelectedPackages();
    });

    document.getElementById("columnResizer").addEventListener("mousedown", (event) => {
      isResizingColumns = true;
      event.preventDefault();
      event.currentTarget.classList.add("is-dragging");
    });

    document.addEventListener("mousemove", (event) => {
      if (isResizingColumns) {
        setEditorColumnWidth(event.clientX);
      }

      if (isResizingTopPanel) {
        setTopPanelHeight(event.clientY);
      }
    });

    document.addEventListener("mouseup", () => {
      if (!isResizingColumns) {
        if (!isResizingTopPanel) {
          return;
        }
      }

      if (isResizingColumns) {
        isResizingColumns = false;
        document.getElementById("columnResizer").classList.remove("is-dragging");
      }

      if (isResizingTopPanel) {
        isResizingTopPanel = false;
        document.getElementById("topPanelResizeHandle").classList.remove("is-dragging");
      }
    });

    document.getElementById("topPanelResizeHandle").addEventListener("mousedown", (event) => {
      isResizingTopPanel = true;
      event.preventDefault();
      event.currentTarget.classList.add("is-dragging");
    });

    document.getElementById("loadConfigBtn").addEventListener("click", () => {
      document.getElementById("configFileInput").click();
    });

    document.getElementById("restoreConfigBtn").addEventListener("click", () => {
      restoreDefaultConfig();
    });

    document.getElementById("configFileInput").addEventListener("change", (event) => {
      const [file] = Array.from(event.target.files || []);
      event.target.value = "";
      if (!file) {
        return;
      }

      loadConfigFile(file).catch((error) => {
        const operation = createOperationCard("Load Config Failed");
        operation.consoleEl.textContent = String(error) + "\n";
        setStatus("Failed.");
      });
    });

    document.getElementById("fileInput").addEventListener("change", (event) => {
      setFiles(event.target.files || []);
      event.target.value = "";
    });

    renderPackageFilters();
    renderPackageOptions();
    applyConfig(getDefaultConfig());
    initCodeEditor();

    initPyodide().catch((error) => {
      const operation = createOperationCard("Initialization Failed");
      operation.consoleEl.textContent = String(error) + "\n";
      setStatus("Initialization failed.");
    });
  </script>
</body>
</html>
